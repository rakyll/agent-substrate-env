apiVersion: v1
kind: Namespace
metadata:
  name: ate-env
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ate-env-config
  namespace: ate-env
data:
  config.yaml: |
    listen: ":7777"
    skills_dir: "/skills"
    ate:
      ateapi: "ateapi.ate-system.svc.cluster.local:443"
    environments:
      - name: "default-env"
        template: "default-env-template"
        atespace: "default"
        allowed_tools:
          - "bash"
          - "read_file"
          - "write_file"
          - "list_dir"
          - "list_skills"
          - "activate_skill"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ate-env
  namespace: ate-env
  labels:
    app: ate-env
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ate-env
  template:
    metadata:
      labels:
        app: ate-env
    spec:
      containers:
        - name: ate-env
          image: ${ATE_ENV_IMAGE}
          command: ["/ate-env", "serve", "--config", "/etc/ate-env/config.yaml"]
          ports:
            - containerPort: 7777
          readinessProbe:
            httpGet:
              path: /healthz
              port: 7777
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/ate-env
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: ate-env-config
---
apiVersion: ate.dev/v1alpha1
kind: WorkerPool
metadata:
  name: default-env-workerpool
  namespace: default
  labels:
    workload: default-env
spec:
  replicas: 5
  ateomImage: ${ATEOM_IMAGE}
---
apiVersion: ate.dev/v1alpha1
kind: ActorTemplate
metadata:
  name: default-env-template
  namespace: default
spec:
  workerSelector:
    matchLabels:
      workload: default-env
  pauseImage: "gcr.io/gke-release/pause@sha256:bcbd57ba5653580ec647b16d8163cdd1112df3609129b01f912a8032e48265da"
  containers:
    - name: "bash"
      image: ${ATE_ENV_IMAGE}